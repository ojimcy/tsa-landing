<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 1140" preserveAspectRatio="xMidYMid slice" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif">
  <rect width="540" height="1140" fill="#F1F5F9"/>

  <!-- header -->
  <rect width="540" height="100" fill="#FFFFFF"/>
  <g transform="translate(28 42)" fill="#9D6B38">
    <rect width="28" height="3" rx="1.5"/>
    <rect y="9" width="28" height="3" rx="1.5"/>
    <rect y="18" width="28" height="3" rx="1.5"/>
  </g>
  <text x="270" y="60" text-anchor="middle" font-size="24" font-weight="700" fill="#9D6B38">TSA Connect</text>
  <g transform="translate(440 50)" stroke="#1F2937" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-9 -1c0-5 4-9 9-9s9 4 9 9v6l3 4h-24l3-4z"/>
    <path d="M-3 7c0 2 1 4 3 4s3-2 3-4"/>
  </g>
  <circle cx="500" cy="50" r="20" fill="#9D6B38"/>
  <text x="500" y="58" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">U</text>

  <!-- search bar -->
  <rect x="20" y="135" width="430" height="58" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <g transform="translate(48 164)" stroke="#94A3B8" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle r="7"/>
    <path d="M5 5l5 5"/>
  </g>
  <text x="78" y="172" font-size="17" fill="#94A3B8">Search products or services...</text>
  <g transform="translate(488 164)" fill="none" stroke="#9D6B38" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-10 -6h22l-2 13h-18z"/>
    <circle cx="-5" cy="11" r="2.5"/>
    <circle cx="5" cy="11" r="2.5"/>
  </g>

  <!-- filter pills -->
  <g font-size="15" font-weight="600">
    <rect x="20" y="220" width="100" height="40" rx="20" fill="#9D6B38"/>
    <text x="70" y="246" text-anchor="middle" fill="#FFFFFF">Products</text>
    <rect x="130" y="220" width="98" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="179" y="246" text-anchor="middle" fill="#475569">Services</text>
    <rect x="238" y="220" width="118" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="297" y="246" text-anchor="middle" fill="#475569">Trade &amp; Earn</text>
    <rect x="366" y="220" width="108" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="420" y="246" text-anchor="middle" fill="#475569">Buy USDT</text>
  </g>

  <!-- ============ CARD GRID ============ -->
  <!-- shared card geometry: width 240, gap 20, x = 20 / 280 -->

  <!-- Row 1: Bakery / Cars (height 180) -->
  <!-- Card 1: Bakery -->
  <rect x="20" y="290" width="240" height="180" rx="18" fill="#FFFFFF"/>
  <rect x="38" y="308" width="100" height="100" rx="14" fill="#F4D9A8"/>
  <g transform="translate(88 360)">
    <ellipse cx="-22" cy="-4" rx="14" ry="9" fill="#C97A3D"/>
    <ellipse cx="22" cy="-4" rx="14" ry="9" fill="#C97A3D"/>
    <ellipse cx="0" cy="6" rx="14" ry="9" fill="#A0561E"/>
    <ellipse cx="-15" cy="14" rx="11" ry="7" fill="#D69961"/>
    <ellipse cx="15" cy="14" rx="11" ry="7" fill="#D69961"/>
  </g>
  <text x="38" y="440" font-size="18" font-weight="700" fill="#0F172A">Bakery</text>

  <!-- Card 2: Cars -->
  <rect x="280" y="290" width="240" height="180" rx="18" fill="#FFFFFF"/>
  <!-- 4-panel mosaic of car photos -->
  <g transform="translate(298 308)">
    <rect width="48" height="48" rx="8" fill="#DC2626"/>
    <rect x="52" width="48" height="48" rx="8" fill="#F97316"/>
    <rect y="52" width="48" height="48" rx="8" fill="#1D4ED8"/>
    <rect x="52" y="52" width="48" height="48" rx="8" fill="#0F172A"/>
    <!-- tiny car silhouettes -->
    <g fill="#FFFFFF" opacity="0.9">
      <path d="M10 28h28l-3 -6h-22z"/>
      <circle cx="16" cy="32" r="3" fill="#1F2937"/>
      <circle cx="32" cy="32" r="3" fill="#1F2937"/>
      <path d="M62 28h28l-3 -6h-22z"/>
      <circle cx="68" cy="32" r="3" fill="#1F2937"/>
      <circle cx="84" cy="32" r="3" fill="#1F2937"/>
      <path d="M10 80h28l-3 -6h-22z"/>
      <circle cx="16" cy="84" r="3" fill="#0F172A"/>
      <circle cx="32" cy="84" r="3" fill="#0F172A"/>
      <path d="M62 80h28l-3 -6h-22z" opacity="0.7"/>
      <circle cx="68" cy="84" r="3" fill="#1F2937" opacity="0.7"/>
      <circle cx="84" cy="84" r="3" fill="#1F2937" opacity="0.7"/>
    </g>
  </g>
  <text x="298" y="440" font-size="18" font-weight="700" fill="#0F172A">Cars</text>

  <!-- Row 2: Electronics & Gadgets / Fresh produce sales (height 220) -->
  <!-- Card 3: Electronics & Gadgets (with item count) -->
  <rect x="20" y="490" width="240" height="220" rx="18" fill="#FFFFFF"/>
  <rect x="38" y="508" width="100" height="100" rx="14" fill="#DBEAFE"/>
  <g transform="translate(88 558)">
    <!-- monitor -->
    <rect x="-32" y="-22" width="38" height="26" rx="2" fill="#1E40AF"/>
    <rect x="-30" y="-20" width="34" height="22" rx="1" fill="#3B82F6"/>
    <rect x="-18" y="4" width="14" height="3" rx="1" fill="#1E40AF"/>
    <!-- laptop -->
    <rect x="8" y="-10" width="22" height="14" rx="1" fill="#0F172A"/>
    <rect x="6" y="4" width="26" height="3" rx="1" fill="#475569"/>
    <!-- phone -->
    <rect x="-10" y="6" width="10" height="16" rx="2" fill="#0F172A"/>
    <rect x="-8" y="8" width="6" height="10" fill="#3B82F6"/>
  </g>
  <text x="38" y="638" font-size="18" font-weight="700" fill="#0F172A">Electronics &amp;</text>
  <text x="38" y="662" font-size="18" font-weight="700" fill="#0F172A">Gadgets</text>
  <text x="38" y="690" font-size="14" font-weight="600" fill="#9D6B38">4 items</text>

  <!-- Card 4: Fresh produce sales -->
  <rect x="280" y="490" width="240" height="220" rx="18" fill="#FFFFFF"/>
  <rect x="298" y="508" width="100" height="100" rx="14" fill="#FED7AA"/>
  <g transform="translate(348 558)">
    <circle cx="-22" cy="-12" r="14" fill="#F97316"/>
    <circle cx="22" cy="-12" r="14" fill="#EF4444"/>
    <circle cx="0" cy="0" r="16" fill="#22C55E"/>
    <circle cx="-22" cy="14" r="12" fill="#FACC15"/>
    <circle cx="22" cy="14" r="12" fill="#A855F7"/>
    <!-- leafy stems -->
    <path d="M-22 -22 q-3 -4 -6 -3" stroke="#15803D" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M22 -22 q3 -4 6 -3" stroke="#15803D" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="298" y="638" font-size="18" font-weight="700" fill="#0F172A">Fresh produce sales</text>

  <!-- Row 3: Furniture & Home Decor / Generator (height 220) -->
  <!-- Card 5: Furniture & Home Decor (with item count) -->
  <rect x="20" y="730" width="240" height="220" rx="18" fill="#FFFFFF"/>
  <rect x="38" y="748" width="100" height="100" rx="14" fill="#E5DCC9"/>
  <g transform="translate(88 798)">
    <!-- ornate gold frame on wall -->
    <rect x="-32" y="-30" width="20" height="28" fill="#92400E" stroke="#451A03" stroke-width="1.5"/>
    <rect x="-30" y="-28" width="16" height="24" fill="#FBBF24"/>
    <!-- another frame -->
    <rect x="-8" y="-30" width="16" height="20" fill="#A16207" stroke="#451A03" stroke-width="1.5"/>
    <rect x="-6" y="-28" width="12" height="16" fill="#FBBF24"/>
    <!-- table/stand below -->
    <rect x="-30" y="6" width="60" height="6" fill="#92400E"/>
    <rect x="-26" y="12" width="3" height="14" fill="#92400E"/>
    <rect x="23" y="12" width="3" height="14" fill="#92400E"/>
    <!-- side furniture -->
    <rect x="14" y="-12" width="22" height="22" fill="#A16207"/>
  </g>
  <text x="38" y="878" font-size="18" font-weight="700" fill="#0F172A">Furniture &amp; Home</text>
  <text x="38" y="902" font-size="18" font-weight="700" fill="#0F172A">Decor</text>
  <text x="38" y="930" font-size="14" font-weight="600" fill="#9D6B38">1 item</text>

  <!-- Card 6: Generator / Power equipment -->
  <rect x="280" y="730" width="240" height="220" rx="18" fill="#FFFFFF"/>
  <rect x="298" y="748" width="100" height="100" rx="14" fill="#1F2937"/>
  <g transform="translate(348 798)">
    <!-- yellow generator body -->
    <rect x="-24" y="-14" width="48" height="28" rx="3" fill="#FACC15" stroke="#854D0E" stroke-width="1.5"/>
    <rect x="-20" y="-10" width="14" height="10" rx="1" fill="#1F2937"/>
    <circle cx="-13" cy="-5" r="3" fill="#FACC15"/>
    <rect x="-2" y="-8" width="20" height="4" rx="1" fill="#854D0E"/>
    <rect x="-2" y="-2" width="20" height="3" rx="1" fill="#854D0E"/>
    <!-- handle on top -->
    <path d="M-12 -14 L-12 -22 L12 -22 L12 -14" stroke="#854D0E" stroke-width="2" fill="none"/>
    <!-- wheels -->
    <circle cx="-16" cy="14" r="4" fill="#1F2937"/>
    <circle cx="16" cy="14" r="4" fill="#1F2937"/>
  </g>
  <text x="298" y="878" font-size="18" font-weight="700" fill="#0F172A">Generator/ Power</text>
  <text x="298" y="902" font-size="18" font-weight="700" fill="#0F172A">equipment</text>

  <!-- Row 4 (partial peek) -->
  <rect x="20" y="970" width="240" height="80" rx="18" fill="#FFFFFF"/>
  <rect x="38" y="988" width="100" height="60" rx="14" fill="#0F172A"/>
  <g transform="translate(88 1018)">
    <!-- jewelry sparkle -->
    <circle cx="-15" cy="-8" r="3" fill="#FBBF24"/>
    <circle cx="15" cy="-8" r="3" fill="#FBBF24"/>
    <circle cx="0" cy="0" r="4" fill="#F1F5F9"/>
    <circle cx="-12" cy="8" r="2.5" fill="#FBBF24"/>
    <circle cx="12" cy="8" r="2.5" fill="#FBBF24"/>
  </g>

  <rect x="280" y="970" width="240" height="80" rx="18" fill="#FFFFFF"/>
  <rect x="298" y="988" width="100" height="60" rx="14" fill="#1E40AF"/>
  <g transform="translate(348 1018)" fill="#3B82F6">
    <rect x="-22" y="-10" width="44" height="20" rx="2"/>
    <rect x="-18" y="-6" width="36" height="12" rx="1" fill="#60A5FA"/>
  </g>

  <!-- bottom tab bar (Marketplace active) -->
  <rect x="0" y="1040" width="540" height="100" fill="#FFFFFF"/>
  <line x1="0" y1="1040" x2="540" y2="1040" stroke="#E2E8F0"/>
  <g font-size="12" text-anchor="middle">
    <g transform="translate(60 1078)" fill="none" stroke="#94A3B8" stroke-width="2.4" stroke-linecap="round">
      <ellipse cx="-4" cy="0" rx="6" ry="4" transform="rotate(-30)"/>
      <ellipse cx="4" cy="0" rx="6" ry="4" transform="rotate(-30)"/>
    </g>
    <text x="60" y="1112" fill="#94A3B8">Tsa Connect</text>

    <g transform="translate(170 1078)" stroke="#9D6B38" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-10 -4h20l-2 12h-16z"/>
      <circle cx="-4" cy="12" r="2.5"/>
      <circle cx="6" cy="12" r="2.5"/>
    </g>
    <text x="170" y="1112" fill="#9D6B38" font-weight="700">Marketplace</text>

    <g transform="translate(280 1078)" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-1" cy="-4" r="4"/>
      <path d="M-8 9a8 8 0 0 1 14 -1"/>
      <circle cx="7" cy="-2" r="3"/>
    </g>
    <text x="280" y="1112" fill="#94A3B8">Services</text>

    <g transform="translate(390 1078)" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-8 -4h14 l-3 -3 M6 4h-14 l3 3"/>
    </g>
    <text x="390" y="1112" fill="#94A3B8">Easyswap</text>

    <g transform="translate(490 1078)" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-10 -6h20v12h-20z"/>
      <circle cx="5" cy="0" r="2.2" fill="#94A3B8"/>
    </g>
    <text x="490" y="1112" fill="#94A3B8">Wallet</text>
  </g>
</svg>
